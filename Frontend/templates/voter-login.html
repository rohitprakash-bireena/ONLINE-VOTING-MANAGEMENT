<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Login - SecureVote</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='voter.css') }}">
</head>
<body class="login-body" data-page="voter-login" data-error="{{ error|default('', true)|e }}" data-success="{{ success|default('', true)|e }}">
    <div class="login-wrapper">
        <div class="card login-card">
            <div class="card-icon">👤</div>
            <h3>Voter Secure Login</h3>
            <p class="login-subtitle">Enter your details to access the voting portal.</p>

            <form id="voterLoginForm" action="/voter-login" method="POST" class="login-form">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label class="form-label">Voter ID</label>
                    <input type="text" name="voter_id" class="form-input" placeholder="Format: ABC1234567" pattern="[A-Za-z]{3}[0-9]{7}" minlength="10" maxlength="10" title="Voter ID must be in format ABC1234567" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-blue" style="width: 100%; margin-top: 10px;">Login to Portal</button>
            </form>
            <div style="margin-top: 20px;">
                <a href="/voter-register" style="color: #4a5568; font-size: 0.9em;">New Voter? Register here</a>
            </div>
            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('static', filename='voter.js') }}"></script>
</body>
</html>
