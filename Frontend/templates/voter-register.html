<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Registration - SecureVote</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='voter.css') }}">
</head>
<body class="login-body" data-page="voter-register" data-error="{{ error|default('', true)|e }}" data-success="{{ success|default('', true)|e }}">
    <div class="login-wrapper">
        <div class="card login-card">
            <div class="card-icon">📝</div>
            <h3>New Voter Registration</h3>
            <p class="login-subtitle">Register yourself to cast your vote.</p>

            <form id="voterRegisterForm" action="/voter-register" method="POST" class="login-form">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-input" placeholder="E.g. Sweta Kumari" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Voter ID Number</label>
                    <input type="text" name="voter_id" class="form-input" placeholder="Format: ABC1234567" pattern="[A-Za-z]{3}[0-9]{7}" minlength="10" maxlength="10" title="Voter ID must be in format ABC1234567" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Mobile Number</label>
                    <input type="tel" name="mobile_number" class="form-input" placeholder="10-digit mobile number" pattern="[0-9]{10}" minlength="10" maxlength="10" title="Enter a valid 10-digit mobile number" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email ID</label>
                    <input type="email" name="email" class="form-input" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Create Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Strong password" required>
                </div>
                <button type="submit" class="btn btn-blue" style="width: 100%; margin-top: 10px;">Register</button>
            </form>
            <div style="margin-top: 20px;">
                <a href="/voter-login" style="color: #4a5568; font-size: 0.9em;">Already registered? Login here</a>
            </div>
            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('static', filename='voter.js') }}"></script>
</body>
</html>
