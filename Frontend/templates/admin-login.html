<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SecureVote</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">

    <div class="login-wrapper">
        <div class="card login-card">
            <div class="card-icon">⚙️</div>
            <h3>Admin Secure Login</h3>
            <p class="login-subtitle">Please enter your credentials to access the dashboard.</p>

            <form action="/admin-login" method="POST" class="login-form">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input" placeholder="Enter admin username" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="btn btn-dark">Login to Dashboard</button>
            </form>

            <div style="margin-top: 20px; text-align: center;">
                <a href="/admin-register" style="color: #4a5568; font-size: 0.9em;">New Admin? Register here</a>
            </div>
            
            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    {% if success %}
    <script>
        Swal.fire({
            icon: 'success',
            title: 'Success',
            text: '{{ success }}',
            confirmButtonColor: '#2f855a'
        });
    </script>
    {% endif %}
    {% if error %}
    <script>
        Swal.fire({
            icon: 'error',
            title: 'Login Failed',
            text: '{{ error }}',
            confirmButtonColor: '#2d3748'
        });
    </script>
    {% endif %}

</body>
</html>
